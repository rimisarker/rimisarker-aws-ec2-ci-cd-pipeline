name: CI/CD for Flask App

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to AWS EC2
        run: |
          echo "${{ secrets.AWS_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} << EOF
            
            # Login to Docker Hub on EC2
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Setup network
            docker network create app_network || true

            # Cleanup
            docker stop mysql-db flask-app || true
            docker rm mysql-db flask-app || true

            # Run MySQL
            docker run -d --name mysql-db --network app_network \
              -e MYSQL_ROOT_PASSWORD='${{ secrets.MYSQL_ROOT_PASSWORD }}' \
              -e MYSQL_DATABASE=attendance_db \
              -p 3306:3306 mysql:latest

            echo "Waiting for MySQL..."
            sleep 30

            # Pull and Run Flask
            docker pull ${{ secrets.DOCKER_USERNAME }}/flask-attendance-app:latest
            
            docker run -d --name flask-app --network app_network \
              -p 5000:5000 \
              -e DB_HOST=mysql-db \
              -e DB_USER=root \
              -e DB_PASSWORD='${{ secrets.MYSQL_ROOT_PASSWORD }}' \
              -e DB_NAME=attendance_db \
              ${{ secrets.DOCKER_USERNAME }}/flask-attendance-app:latest
          EOF